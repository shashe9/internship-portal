<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Internship Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-briefcase"></i> Internship Portal</h1>
    </header>

    <div class="container" style="max-width: 450px;">
        <div class="form-container">
            <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
            
            <div id="loginMessage" class="message"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Application</a>
            </div>
        </div>
    </div>

    <script>
        // basic script for admin login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // redirect to dashboard on successful login
                    window.location.href = 'admin-dashboard.html';
                } else {
                    msgBox.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${result.message || "Login failed"}`;
                    msgBox.className = 'message error';
                    msgBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error("Login error:", error);
                msgBox.innerHTML = `<i class="fas fa-exclamation-circle"></i> Server error. Please try again.`;
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
    </script>
</body>
</html>
